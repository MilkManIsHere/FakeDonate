<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Fake Donate Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .hidden { display: none; }

    button { cursor: pointer; }

    #topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #222;
    }

    #balance {
      font-size: 18px;
      color: lime;
    }

    #menu, #serverView {
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .booth {
      background: #222;
      padding: 10px;
      border: 1px solid #444;
      min-height: 80px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      padding: 5px;
      margin: 5px;
    }

    .panel {
      background: #1b1b1b;
      padding: 10px;
      margin: 10px 0;
    }

    .clickable {
      background: #333;
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>
<body>

<div id="auth">
  <h2>Login / Signup</h2>
  <input id="user" placeholder="username" />
  <input id="pass" type="password" placeholder="password" />
  <input id="pass2" type="password" placeholder="confirm (signup)" />
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">

  <div id="topbar">
    <div>
      Logged in as <span id="me"></span>
    </div>
    <div id="balance">$0.00</div>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- MENU -->
  <div id="menu">
    <h2>Main Menu</h2>

    <h3>Public Servers</h3>
    <div id="publicServers"></div>

    <h3>Private Servers</h3>
    <button onclick="createServer()">Create Private Server</button>
    <div id="privateServers"></div>
  </div>

  <!-- SERVER VIEW -->
  <div id="serverView" class="hidden">

    <button onclick="leaveServer()">⬅ Leave Server</button>

    <h2 id="serverName"></h2>

    <div class="panel">
      <h3>Chat</h3>
      <div id="chatBox" style="height:150px; overflow:auto;"></div>
      <input id="chatInput" placeholder="message" />
      <button onclick="sendChat()">Send</button>
    </div>

    <div class="panel">
      <h3>Booths</h3>
      <div id="booths" class="grid"></div>
    </div>

  </div>
</div>

<script>
let token = null;
let state = null;

async function api(url, body={}) {
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-session-token": token
    },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function getState() {
  const res = await fetch("/api/state", {
    headers: { "x-session-token": token }
  });
  state = await res.json();
  render();
}

/* AUTH */
async function signup() {
  const res = await api("/api/signup", {
    username: user.value,
    password: pass.value,
    confirmPassword: pass2.value
  });
  if (res.token) {
    token = res.token;
    enterApp();
  } else alert(res.error);
}

async function login() {
  const res = await api("/api/login", {
    username: user.value,
    password: pass.value
  });
  if (res.token) {
    token = res.token;
    enterApp();
  } else alert(res.error);
}

function logout() {
  token = null;
  location.reload();
}

function enterApp() {
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  setInterval(getState, 1000);
}

/* MENU */
function render() {
  if (!state) return;

  document.getElementById("me").innerText = state.me.username;
  document.getElementById("balance").innerText =
    "$" + (state.me.balanceCents / 100).toFixed(2);

  // public
  const pub = document.getElementById("publicServers");
  pub.innerHTML = "";
  state.publicServers.forEach(s => {
    const div = document.createElement("div");
    div.className = "clickable";
    div.innerText = `${s.name} | Players: ${s.players}/20`;
    div.onclick = () => joinServer(s.id);
    pub.appendChild(div);
  });

  // private
  const priv = document.getElementById("privateServers");
  priv.innerHTML = "";
  state.privateServers.forEach(s => {
    const div = document.createElement("div");
    div.className = "clickable";
    div.innerText = `${s.name} | Players: ${s.players}/20`;
    div.onclick = () => joinServer(s.id);
    priv.appendChild(div);
  });

  // server view
  if (state.me.currentServerId) {
    showServer();
  }
}

/* SERVER ACTIONS */
async function createServer() {
  const name = prompt("Server name (3-20 chars)");
  const unlocked = confirm("Unlocked? OK=yes Cancel=locked");
  let password = "";

  if (!unlocked) {
    password = prompt("Password 8-24 chars");
  }

  const res = await api("/api/create-server", {
    name,
    unlocked,
    password
  });

  if (res.error) alert(res.error);
}

async function joinServer(id) {
  const res = await api("/api/join-server", {
    serverId: id,
    password: prompt("Password (if locked)") || ""
  });

  if (res.error) alert(res.error);
  getState();
}

async function leaveServer() {
  await api("/api/leave-server");
  document.getElementById("serverView").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
  getState();
}

/* SERVER VIEW */
function showServer() {
  const server = state.publicServers.concat(state.privateServers)
    .find(s => s.id === state.me.currentServerId);

  if (!server) return;

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("serverView").classList.remove("hidden");

  document.getElementById("serverName").innerText = server.name;

  // booths
  const wrap = document.getElementById("booths");
  wrap.innerHTML = "";

  server.booths.forEach(b => {
    const box = document.createElement("div");
    box.className = "booth";

    box.innerHTML = `
      <b>${b.owner || "Empty"}</b><br>
      ${b.text.slice(0, 80)}<br><br>
      <button onclick="claim('${b.id}')">
        ${b.owner ? (b.owner === state.me.username ? "Unclaim" : "Taken") : "Claim"}
      </button>
      <button onclick="edit('${b.id}')">Edit</button>
      <br><br>
      <input id="d1-${b.id}" placeholder="$" style="width:40px">
      <input id="d2-${b.id}" placeholder="¢" style="width:40px">
      <button onclick="donate('${b.id}')">Donate</button>
    `;

    wrap.appendChild(box);
  });

  // chat
  const chat = document.getElementById("chatBox");
  chat.innerHTML = "";
  (state.chat || []).forEach(m => {
    const div = document.createElement("div");
    div.innerText = m.text;
    chat.appendChild(div);
  });
}

async function claim(id) {
  await api("/api/claim-booth", { boothId: id });
  getState();
}

async function edit(id) {
  const text = prompt("Edit booth text (max 200)");
  await api("/api/edit-booth", { boothId: id, text });
  getState();
}

async function donate(id) {
  const d = document.getElementById("d1-" + id).value;
  const c = document.getElementById("d2-" + id).value;

  const res = await api("/api/donate", {
    boothId: id,
    dollars: d,
    cents: c
  });

  if (res.error) alert(res.error);
  getState();
}

async function sendChat() {
  const text = document.getElementById("chatInput").value;
  await api("/api/message", { text });
  document.getElementById("chatInput").value = "";
  getState();
}

/* fake balance tick UI */
setInterval(() => {
  if (!state?.me) return;
  let cents = state.me.balanceCents;
  document.getElementById("balance").innerText =
    "$" + (cents / 100).toFixed(2);
}, 500);
</script>

</body>
</html>
